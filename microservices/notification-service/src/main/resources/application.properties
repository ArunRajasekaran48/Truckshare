spring.application.name=NOTIFICATION-SERVICE
server.port=8086

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/truckshare_notification-service
spring.datasource.username=postgres
spring.datasource.password=sece@123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Distributed Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Logging pattern with Trace ID and Span ID
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# SendGrid Configuration (Placeholders)
# Replace with your actual SendGrid API Key and verified sender email
sendgrid.api.key=YOUR_SENDGRID_API_KEY
sendgrid.from.email=YOUR_GMAIL_ADDRESS

# Default recipient for testing (if user email is not found)
app.default.user.email=Recipient_Email_Address
